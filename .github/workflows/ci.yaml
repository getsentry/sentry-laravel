name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - release/**

permissions:
  contents: read

# Cancel in progress workflows on pull_requests.
# https://docs.github.com/en/actions/using-jobs/using-concurrency#example-using-a-fallback-value
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  COMPOSER_ADVISORY_LARAVEL_6_TO_9: >-
    [
      "PKSA-8qx3-n5y5-vvnd"
    ]
  COMPOSER_ADVISORY_COMMONMARK_1: >-
    [
      "PKSA-rqc2-tcc6-nc79",
      "PKSA-fndg-qryc-dyc9"
    ]
  COMPOSER_ADVISORY_LARAVEL_6_SYMFONY: >-
    [
      "PKSA-365x-2zjk-pt47",
      "PKSA-b35n-565h-rs4q",
      "PKSA-rkkf-636k-qjb3",
      "PKSA-wws7-mr54-jsny",
      "PKSA-bf7t-jnpz-492k",
      "PKSA-yc7t-91v9-99xs"
    ]
  COMPOSER_ADVISORY_LARAVEL_9_PHP_8_0_SYMFONY: >-
    [
      "PKSA-365x-2zjk-pt47",
      "PKSA-b35n-565h-rs4q",
      "PKSA-28rh-rzzn-djk4",
      "PKSA-wtxr-p26d-nn42",
      "PKSA-2n2k-66v2-bwg3",
      "PKSA-wws7-mr54-jsny",
      "PKSA-bf7t-jnpz-492k",
      "PKSA-yc7t-91v9-99xs",
      "PKSA-v5yj-8nmz-sk2q",
      "PKSA-ft77-7h5f-p3r6",
      "PKSA-b14r-zh1d-vdrc"
    ]

jobs:
  phpunit:
    runs-on: ubuntu-latest
    env:
      COMPOSER_NO_INTERACTION: 1

    strategy:
      fail-fast: false
      matrix:
        php: [ "8.5", "8.4", "8.3", "8.2", "8.1" ]
        packages:
          # All versions below only support PHP ^8.1 (Laravel requirement)
          - { laravel: ^10.0,  testbench: ^8.0, phpunit: 9.6.* }

          # All versions below only support PHP ^8.2 (Laravel requirement)
          - { laravel: ^11.0,  testbench: ^9.0, phpunit: 10.5.* }
          - { laravel: ^12.0,  testbench: ^10.0, phpunit: 11.5.* }

          # All versions below only support PHP ^8.3 (Laravel requirement)
          - { laravel: ^13.0,  testbench: ^11.0, phpunit: 11.5.* }
        exclude:
          - php: "8.1"
            packages: { laravel: ^11.0,  testbench: ^9.0, phpunit: 10.5.* }
          - php: "8.1"
            packages: { laravel: ^12.0,  testbench: ^10.0, phpunit: 11.5.* }
          - php: "8.1"
            packages: { laravel: ^13.0,  testbench: ^11.0, phpunit: 11.5.* }
          - php: "8.2"
            packages: { laravel: ^13.0,  testbench: ^11.0, phpunit: 11.5.* }

    name: phpunit (PHP:${{ matrix.php }}, Laravel:${{ matrix.packages.laravel }})

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@728c6c6b8cf02c2e48117716a91ee48313958a19 # v2
        with:
          php-version: ${{ matrix.php }}
          coverage: pcov
          tools: composer:v2

      - name: Configure Composer dependencies
        run: |
          # friendsofphp/php-cs-fixer: No need for this package to run phpunit and it conflicts with older Laravel versions
          # laravel/pennant: Does not yet support Laravel 13
          # laravel/octane: Does not yet support Laravel 13
          composer remove friendsofphp/php-cs-fixer --dev --no-interaction --no-update
          [[ "${{ matrix.packages.laravel }}" == "^13.0" ]] && composer remove laravel/pennant laravel/octane --dev --no-interaction --no-update || true

          # Require the correct versions we want to run phpunit for
          composer require \
            "laravel/framework:${{ matrix.packages.laravel }}" \
            "illuminate/support:${{ matrix.packages.laravel }}" \
            "phpunit/phpunit:${{ matrix.packages.phpunit }}" \
            "orchestra/testbench:${{ matrix.packages.testbench }}" \
            --no-interaction --no-update

      - name: Resolve dependencies
        run: composer update --no-progress --no-interaction --prefer-dist --no-install --no-scripts --no-audit

      - name: Audit dependencies
        run: composer audit --locked --no-interaction --format=table --abandoned=report

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run phpunit
        run: vendor/bin/phpunit --coverage-clover=coverage.xml --coverage-filter=src/Sentry

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  phpunit-legacy:
    runs-on: ubuntu-latest
    env:
      COMPOSER_NO_INTERACTION: 1

    strategy:
      fail-fast: false
      matrix:
        php: [ "8.5", "8.4", "8.3", "8.2", "8.1", "8.0", "7.4", "7.3", "7.2" ]
        packages:
          # All versions below should be test on PHP ^7.1 (Sentry SDK requirement) and PHP < 8.0 (PHPUnit requirement)
          - { laravel: ^6.0,  testbench: 4.7.*, phpunit: 8.5.* }
          - { laravel: ^7.0,  testbench: 5.1.*, phpunit: 8.5.* }

          # All versions below only support PHP ^7.3 (Laravel requirement)
          - { laravel: ^8.0,  testbench: ^6.0, phpunit: 9.6.* }

          # All versions below only support PHP ^8.0 (Laravel requirement)
          - { laravel: ^9.0,  testbench: ^7.0, phpunit: 9.6.* }
        exclude:
          - php: "7.2"
            packages: { laravel: ^8.0,  testbench: ^6.0, phpunit: 9.6.* }
          - php: "7.2"
            packages: { laravel: ^9.0,  testbench: ^7.0, phpunit: 9.6.* }

          - php: "7.3"
            packages: { laravel: ^9.0,  testbench: ^7.0, phpunit: 9.6.* }

          - php: "7.4"
            packages: { laravel: ^9.0,  testbench: ^7.0, phpunit: 9.6.* }

          - php: "8.0"
            packages: { laravel: ^6.0,  testbench: 4.7.*, phpunit: 8.5.* }
          - php: "8.0"
            packages: { laravel: ^7.0,  testbench: 5.1.*, phpunit: 8.5.* }

          - php: "8.1"
            packages: { laravel: ^6.0,  testbench: 4.7.*, phpunit: 8.5.* }
          - php: "8.1"
            packages: { laravel: ^7.0,  testbench: 5.1.*, phpunit: 8.5.* }

          - php: "8.2"
            packages: { laravel: ^6.0,  testbench: 4.7.*, phpunit: 8.5.* }
          - php: "8.2"
            packages: { laravel: ^7.0,  testbench: 5.1.*, phpunit: 8.5.* }

          - php: "8.3"
            packages: { laravel: ^6.0,  testbench: 4.7.*, phpunit: 8.5.* }
          - php: "8.3"
            packages: { laravel: ^7.0,  testbench: 5.1.*, phpunit: 8.5.* }
          - php: "8.3"
            packages: { laravel: ^8.0,  testbench: ^6.0, phpunit: 9.6.* }

          - php: "8.4"
            packages: { laravel: ^6.0,  testbench: 4.7.*, phpunit: 8.5.* }
          - php: "8.4"
            packages: { laravel: ^7.0,  testbench: 5.1.*, phpunit: 8.5.* }
          - php: "8.4"
            packages: { laravel: ^8.0,  testbench: ^6.0, phpunit: 9.6.* }

          - php: "8.5"
            packages: { laravel: ^6.0,  testbench: 4.7.*, phpunit: 8.5.* }
          - php: "8.5"
            packages: { laravel: ^7.0,  testbench: 5.1.*, phpunit: 8.5.* }
          - php: "8.5"
            packages: { laravel: ^8.0,  testbench: ^6.0, phpunit: 9.6.* }
          - php: "8.5"
            packages: { laravel: ^9.0,  testbench: ^7.0, phpunit: 9.6.* }

    name: phpunit (PHP:${{ matrix.php }}, Laravel:${{ matrix.packages.laravel }})

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@728c6c6b8cf02c2e48117716a91ee48313958a19 # v2
        with:
          php-version: ${{ matrix.php }}
          coverage: pcov
          tools: composer:v2

      - name: Configure Laravel 6-9 advisory allowlist
        if: ${{ contains(fromJSON('["^6.0","^7.0","^8.0","^9.0"]'), matrix.packages.laravel) }}
        run: composer config --merge --json policy.advisories.ignore-id "$COMPOSER_ADVISORY_LARAVEL_6_TO_9"

      - name: Configure CommonMark 1 advisory allowlist
        if: ${{ matrix.packages.laravel == '^6.0' || matrix.packages.laravel == '^7.0' || (matrix.packages.laravel == '^8.0' && matrix.php == '7.3') }}
        run: composer config --merge --json policy.advisories.ignore-id "$COMPOSER_ADVISORY_COMMONMARK_1"

      - name: Configure Laravel 6 Symfony advisory allowlist
        if: ${{ matrix.packages.laravel == '^6.0' }}
        run: composer config --merge --json policy.advisories.ignore-id "$COMPOSER_ADVISORY_LARAVEL_6_SYMFONY"

      - name: Configure Laravel 9 PHP 8.0 Symfony advisory allowlist
        if: ${{ matrix.packages.laravel == '^9.0' && matrix.php == '8.0' }}
        run: composer config --merge --json policy.advisories.ignore-id "$COMPOSER_ADVISORY_LARAVEL_9_PHP_8_0_SYMFONY"

      - name: Configure Composer dependencies
        run: |
          # friendsofphp/php-cs-fixer: No need for this package to run phpunit and it conflicts with older Laravel versions
          # livewire/livewire: Only supported on Laravel 7.0 and above
          # laravel/folio: Only supported on PHP 8.1 + Laravel 10.0 and above
          # laravel/pennant: Only supported on PHP 8.1 + Laravel 10.0 and above
          # laravel/octane: Only supported on PHP 8.1 + Laravel 10.10.1 and above
          composer remove friendsofphp/php-cs-fixer livewire/livewire laravel/folio laravel/pennant laravel/octane --dev --no-interaction --no-update

          # Require the correct versions we want to run phpunit for
          composer require \
            "laravel/framework:${{ matrix.packages.laravel }}" \
            "illuminate/support:${{ matrix.packages.laravel }}" \
            "phpunit/phpunit:${{ matrix.packages.phpunit }}" \
            "orchestra/testbench:${{ matrix.packages.testbench }}" \
            --no-interaction --no-update

      - name: Resolve dependencies
        run: composer update --no-progress --no-interaction --prefer-dist --no-install --no-scripts --no-audit

      - name: Audit dependencies
        run: composer audit --locked --no-interaction --format=table --abandoned=report

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run phpunit
        run: vendor/bin/phpunit --coverage-clover=coverage.xml --whitelist=src/Sentry

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
